# ─────────────────────────────────────────────────────────────────────────────
# Observability defaults shipped by the tessera-observability module.
#
# These live in META-INF/microprofile-config.properties (config ordinal 100) so a
# deployment's own application.properties (ordinal 250) always wins. Depending on
# tessera-observability is enough to inherit these defaults; no per-deployment
# copy/paste is required. Any key may be overridden downstream.
# ─────────────────────────────────────────────────────────────────────────────

# ── Metrics (Prometheus) ──────────────────────────────────────────────────────
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/q/metrics
quarkus.micrometer.binder.http-server.enabled=true

# ── Tracing (OpenTelemetry) ───────────────────────────────────────────────────
quarkus.otel.exporter.otlp.traces.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
quarkus.otel.traces.sampler=parentbased_traceidratio
quarkus.otel.traces.sampler.arg=${OTEL_TRACES_SAMPLER_ARG:1.0}

# Keep `mvn verify` Docker-free: SDK disabled under the test profile.
%test.quarkus.otel.sdk.disabled=true
