# IAM service — Quarkus runtime configuration.
# Keep this file PRAGMATIC: only properties needed to boot.

# Application identity
quarkus.application.name=tessera

# HTTP
quarkus.http.port=8090

# Virtual threads (structured concurrency, @RunOnVirtualThread).
quarkus.virtual-threads.enabled=true

# Observability. Health probes at /q/health (aggregate), /q/health/ready and
# /q/health/live. Micrometer exposes Prometheus metrics at /q/metrics.
quarkus.micrometer.export.prometheus.path=/q/metrics
quarkus.micrometer.binder.http-server.enabled=true
quarkus.micrometer.binder.jvm=true

# --- Persistence -------------------------------------------------
# PostgreSQL via Hibernate Reactive at runtime; Flyway (over JDBC) owns the schema
# and the row-level-security policies. Hibernate does not generate the schema.
quarkus.datasource.db-kind=postgresql
quarkus.hibernate-orm.database.generation=none
quarkus.flyway.migrate-at-start=true

# Dev Services: opt-in only.
#   %dev  — Dev Services spins up a throwaway Postgres for `quarkus dev`, and the
#           dev-seed Flyway location seeds the fixed dev tenant's ACTIVE signing key
#           so /q/health/ready is UP. (Dev Services runs as a single superuser, so
#           V1's guarded GRANT simply no-ops; RLS isolation is still proven by the IT
#           under the three-role Testcontainers model.)
#   %test — Docker-free: the existing @QuarkusTests boot with NO datasource and the
#           in-memory Item adapter, so Dev Services is OFF and the signing-key
#           readiness check is disabled (it has no reactive datasource to query).
%dev.quarkus.datasource.devservices.enabled=true
%dev.quarkus.flyway.locations=db/migration,db/dev-seed

%test.quarkus.devservices.enabled=false
%test.quarkus.datasource.devservices.enabled=false
# Under %test there is NO datasource: deactivate the datasource and the persistence
# extensions that would otherwise eagerly boot (and fail) against it, so the existing
# Docker-free launcher @QuarkusTests (ItemApiTest, HealthAndMetricsTest,
# HexagonalArchitectureTest) keep booting on the in-memory Item adapter alone. The
# real datasource is exercised by the Testcontainers ITs in iam-persistence.
%test.quarkus.datasource.active=false
%test.quarkus.hibernate-orm.active=false
%test.quarkus.flyway.active=false
%test.quarkus.flyway.migrate-at-start=false

# Signing-key readiness gate: on by default; OFF under %test where
# there is no datasource. See SigningKeyReadinessCheck for the rationale.
iam.readiness.signing-key.enabled=true
%test.iam.readiness.signing-key.enabled=false

# --- OIDC discovery + JWKS ---------------------------------------------------
# The issuer is SERVER CONFIG per resolved realm — never derived from the Host header.
# Baseline tier: one configured issuer serves every realm; per-tenant issuers are a
# later tier. The configured value is used verbatim as the OIDC `iss`.
iam.oidc.issuer=http://localhost:8080
%test.iam.oidc.issuer=https://issuer.test.example

# Publish-before-sign cache safety margin: the JWKS Cache-Control max-age MUST be
# strictly less than the PENDING dwell (how long a key stays PENDING before it signs),
# so a verifier's cache expires and it re-fetches — picking up the PENDING key — before
# that key is promoted to ACTIVE and signs.
iam.oidc.jwks.cache-ttl-seconds=30
iam.oidc.pending-dwell-seconds=120

# --- Audit log ---------------------------------------------------------------
# Per-tenant tamper-evident hash chain with periodically signed checkpoints.
# The checkpoint signer's key identifier (surfaced as the checkpoint keyId so a
# verifier can select the matching public key).
iam.audit.checkpoint.key-id=audit-checkpoint-ed25519
# Interval at which every tenant's chain head is re-signed into a checkpoint.
# A Quarkus duration expression; set to "disabled" to turn the trigger off.
iam.audit.checkpoint.interval=1h
# The launcher @QuarkusTests drive checkpoints explicitly; keep the periodic
# trigger off under %test so it never fires mid-assertion.
%test.iam.audit.checkpoint.interval=disabled
