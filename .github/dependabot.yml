version: 2
updates:
  # Keep Maven dependencies patched (opens PRs for security + version updates).
  - package-ecosystem: maven
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10

  # Keep GitHub Actions pinned and current.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
