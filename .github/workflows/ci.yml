name: CI

# Build, unit tests, and Docker-backed integration tests (Testcontainers) on
# every pull request to main and every push to main. GitHub-hosted Ubuntu
# runners ship a Docker daemon, so the integration tests (incl. the row-level
# security / no-cross-tenant-leakage tests) execute here — they are skipped by
# the local pre-push gate.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build & verify (JDK 25, incl. integration tests)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 25
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build, test, and run integration tests
        run: mvn -B -ntp clean verify
