name: OpenSSF Scorecard

# OpenSSF Scorecard measures the security posture of this repository against
# ~20 automated checks: branch protection, pinned dependencies, code review,
# signed releases, CI test coverage, vulnerability reporting, etc.
#
# Results are published to the OpenSSF API (enables the Scorecard badge) and
# uploaded as SARIF to the Security > Code scanning tab.
#
# Runs weekly and on every push to main so that any deterioration in posture
# (e.g., a newly merged PR that removes a protection) is caught quickly.

on:
  push:
    branches: [main]
  schedule:
    - cron: '30 2 * * 1' # weekly Monday 02:30 UTC (offset from supply-chain.yml)

# Scorecard API (publish_results: true) requires that no write permissions are
# declared at the workflow top level. All writes go at the job level instead.
permissions: read-all

jobs:
  scorecard:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      security-events: write  # upload SARIF to Security > Code Scanning
      id-token: write         # publish signed results to api.securityscorecards.dev
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: scorecard.sarif
          results_format: sarif
          # Publishes results to api.securityscorecards.dev so the Scorecard
          # badge reflects live data. Requires id-token: write.
          publish_results: true

      - name: Upload Scorecard SARIF
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        if: always()
        with:
          sarif_file: scorecard.sarif
          category: scorecard

      - name: Upload Scorecard artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: scorecard-results
          path: scorecard.sarif
          retention-days: 14
