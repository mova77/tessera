# Test configuration for the Authorization Code + PKCE flow.
# A fixed issuer so the RFC 9207 `iss` and the token `iss` claim are assertable.
iam.oidc.issuer=https://issuer.test.example

# Short, deterministic lifetimes for the flow tests.
iam.authflow.code-ttl=PT2M
iam.authflow.access-token-ttl=PT5M
iam.authflow.id-token-ttl=PT5M
